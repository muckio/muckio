<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Effect</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .typing-container {
            text-align: center;
        }
        .typing-text {
            display: block;
            font-weight: bold;
            text-decoration: underline;
            opacity: 0; /* Ẩn ban đầu để tạo hiệu ứng */
            white-space: nowrap; /* Không xuống dòng */
            overflow: hidden; /* Ẩn phần chữ chưa hiển thị */
            border-right: 2px solid #fff; /* Con trỏ nhấp nháy */
            animation: typing 2s steps(30, end) forwards, blink 0.75s step-end infinite;
        }
        /* Hiệu ứng typing cho từng dòng */
        .line1 { animation-delay: 0s; }
        .line2 { animation-delay: 2s; }
        .line3 { animation-delay: 4s; }

        /* Keyframes cho hiệu ứng typing */
        @keyframes typing {
            0% { width: 0; opacity: 1; }
            100% { width: 100%; opacity: 1; }
        }
        /* Keyframes cho con trỏ nhấp nháy */
        @keyframes blink {
            50% { border-color: transparent; }
        }
    </style>
</head>
<body>
    <div class="typing-container">
        <span class="typing-text line1">I'm Mwc, Owner @ squidteam.us.vn</span>
        <span class="typing-text line2">I'm Mwc, Owner @ squidteam.us.vn</span>
        <span class="typing-text line3">Official Partner w/ tcteam</span>
    </div>
</body>
</html>
